<style>
    :root {
        /* 라이트 모드 (기본) */
        --bg-color: #f2f4f5;
        --container-bg: #ffffff;
        --text-main: #393b3d;   /* 진한 회색/검정 */
        --text-sub: #65676b;    /* 연한 회색 */
        --card-border: #eeeeee;
        --card-hover-bg: #f9f9f9;
    }

    /* 시스템 설정이 다크 모드일 때 */
    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #191b1d;
            --container-bg: #232527;
            --text-main: #ffffff !important; /* 무조건 흰색 */
            --text-sub: #b8b8b8 !important;  /* 밝은 회색 */
            --card-border: #333537;
            --card-hover-bg: #2f3133;
        }
        
        /* 혹시나 변수가 안 먹힐 경우를 대비한 직접 지정 */
        body, h1, .image-name {
            color: #ffffff !important;
        }
        p, .image-url, .status-bar, .back-link {
            color: #b8b8b8 !important;
        }
    }

    body { 
        background-color: var(--bg-color); 
        color: var(--text-main); /* 기본 글자색 지정 */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* 제목과 본문 색상 강제 연결 */
    h1 { color: var(--text-main); }
    p { color: var(--text-sub); }
    .image-name { color: var(--text-main); }
    .image-url { color: var(--text-sub); }
</style>
