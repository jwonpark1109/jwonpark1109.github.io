<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 저장소</title>
    <link rel="icon" href="https://jwonpark1109.github.io/test/images/icon.svg">
    <style>
        /* (기존 스타일과 동일) */
        :root { --bg-color: #f2f4f5; --container-bg: #ffffff; --text-main: #393b3d; --text-sub: #65676b; --card-border: #eeeeee; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #191b1d; --container-bg: #232527; --text-main: #ffffff; --text-sub: #b8b8b8; --card-border: #333537; } }
        body { background-color: var(--bg-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .image-card { background: var(--container-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; text-align: center; text-decoration: none; color: inherit; }
        .preview-box { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); border-radius: 8px; margin-bottom: 15px; }
        .preview-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .image-name { font-weight: bold; font-size: 14px; color: var(--text-main); }
    </style>
</head>
<body>
    <h1>이미지 저장소</h1>
    <div class="gallery" id="gallery">로딩 중...</div>

    <script>
        async function loadImages() {
            try {
                // API가 아니라 내 저장소에 있는 json 파일을 읽음 (지연 없음!)
                const response = await fetch('./images.json?t=' + Date.now());
                const images = await response.json();
                
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = images.map(img => `
                    <a href="./images/${img}" class="image-card" target="_blank">
                        <div class="preview-box"><img src="./images/${img}" alt="${img}"></div>
                        <div class="image-name">${img}</div>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('gallery').innerText = "이미지 목록을 찾을 수 없습니다.";
            }
        }
        loadImages();
        setInterval(loadImages, 30000); // 30초마다 갱신
    </script>
</body>
</html>
