<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="error-handler.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP-067 - 데이터베이스 보고서</title>
    <style>
        body {
            background-color: #0c0d0e;
            color: #d4d4d4;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        .doc-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid #99ff00; /* 재단 로고색 강조 */
            padding-bottom: 15px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .doc-logo {
            width: 80px;
            filter: drop-shadow(0 0 8px rgba(153, 255, 0, 0.5));
        }
        .doc-header h2 {
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            margin: 0;
        }
        .content-block {
            background-color: #111315;
            border-left: 5px solid #555;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .content-block.procedure {
            border-left-color: #ffcc00; /* 경고/주의 색상 */
        }
        .content-block p {
            margin: 0 0 15px 0;
        }
        .content-block p:last-child {
            margin-bottom: 0;
        }
        .content-block strong {
            color: #fff;
            font-size: 1.1rem;
        }
        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: #99ff00;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="doc-header">
            <img src="images/sdgicon.png" alt="SDG Logo" class="doc-logo">
            <h2>SDP-067 기밀 문서</h2>
        </div>

        <div class="content-block">
            <p><strong>일련번호:</strong> SDP-067</p>
            <p><strong>별칭:</strong> 럽샷팬 (Loveshot Fan)</p>
            <p><strong>등급:</strong> 유클리드 (Euclid)</p>
        </div>

        <div class="content-block procedure">
            <p><strong>특수 격리 절차:</strong></p>
            <p>SDP-067은 제14구역의 표준 격리실에 보관된다. 인원을 절대로 SDP-067을 봐선 안된다.</p>
        </div>

        <div class="content-block">
            <p><strong>설명:</strong></p>
            <p>SDP-067은 포유류가 볼시 성별이 전환되며 외형도 그에 맞게 바뀐다. 낮은 확률로 바퀴벌레가 되기도 한다.</p>
        </div>

        <a href="index.html" class="back-btn">< 메인 데이터베이스로 돌아가기</a>

    </div>

</body>
</html>
