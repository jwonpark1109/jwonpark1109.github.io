<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SDP 재단 - 정보국 허브</title>
    <style>
        body {
            background-color: #111; color: #ddd;
            font-family: 'Arial', sans-serif;
            margin: 0; padding: 50px; display: flex; justify-content: center;
        }
        .dossier {
            background: #f4f4f4; color: #111; padding: 40px; max-width: 700px; width: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; border-radius: 2px;
        }
        .top-secret {
            position: absolute; top: 20px; right: 20px; color: red;
            border: 3px solid red; padding: 5px 15px; font-weight: bold;
            font-size: 1.5rem; transform: rotate(15deg); opacity: 0.8;
        }
        h1 { font-size: 3rem; margin-top: 0; border-bottom: 4px solid #111; }
        .quote {
            font-size: 1.8rem; font-style: italic; font-weight: bold; background: #000;
            color: #fff; display: inline-block; padding: 10px 20px; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dossier">
        <div class="top-secret">TOP SECRET</div>
        <h1>정 보 국</h1>
        <p><strong>인가 등급:</strong> 4등급<br><strong>목적:</strong> 내/외부 감시 및 기밀 수집</p>
        <div class="quote">"모든 정보를 얻는다."</div>
    </div>
</body>
</html>
