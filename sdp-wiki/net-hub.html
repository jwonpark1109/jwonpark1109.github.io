<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SDP 재단 - 인터넷부 허브</title>
    <style>
        body {
            background-color: #000500; color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 50px;
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .terminal {
            border: 1px solid #00ff00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            padding: 40px; max-width: 800px; margin: 0 auto; background: rgba(0,20,0,0.8);
        }
        h1 { font-size: 2.5rem; border-bottom: 2px dashed #00ff00; padding-bottom: 10px; margin-top: 0; }
        .typing {
            font-size: 1.5rem; white-space: nowrap; overflow: hidden;
            border-right: 3px solid #00ff00; width: 0;
            animation: typing 3s steps(30, end) forwards, blink 1s infinite;
        }
        @keyframes typing { to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>> 인터넷부_</h1>
        <p class="typing">세상의 모든 정보는 인터넷에.</p>
    </div>
</body>
</html>
