<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP 재단 - 제03기지 인트라넷</title>
    <style>
        /* 텍스트 드래그 색상 변경 */
        ::selection {
            background-color: #990000;
            color: #ffffff;
        }

        body {
            background-color: #f7f7f7;
            color: #333333;
            font-family: 'Courier New', Courier, monospace, '맑은 고딕';
            margin: 0;
            padding: 0;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT 모니터 스캔라인 및 노이즈 효과 */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9998;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* 화면 미세 깜빡임 효과 */
        .flicker {
            animation: flicker-anim 0.15s infinite;
        }

        @keyframes flicker-anim {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        /* 로딩 화면 (터미널 부팅) */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #00ff00;
            z-index: 9999;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: opacity 1s ease-in-out;
        }

        .boot-line {
            margin-bottom: 8px;
            font-size: 14px;
            text-shadow: 0 0 5px #00ff00;
            opacity: 0;
        }

        .boot-error {
            color: #ff3333;
            text-shadow: 0 0 5px #ff3333;
        }

        .warning-bar {
            background-color: #990000;
            color: #ffffff;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            border-bottom: 4px solid #660000;
            text-shadow: 1px 1px 2px #000;
        }

        header {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #333333;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        header h2 {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #aaaaaa;
            border: none;
            padding: 0;
        }

        /* 글리치 텍스트 효과 수정 */
        .glitch-text {
            position: relative;
            display: inline-block;
            font-weight: bold;
        }

        .glitch-text::before, .glitch-text::after {
            content: '제05기지 (Site-05)';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            color: #ff0000;
            opacity: 0;
            z-index: 10;
        }

        @keyframes glitch-anim {
            0% { opacity: 0; transform: translate(0); }
            2% { opacity: 1; transform: translate(-3px, 2px); text-shadow: 2px 0 red, -2px 0 blue; }
            4% { opacity: 0; transform: translate(0); }
            40% { opacity: 0; transform: translate(0); }
            42% { opacity: 1; transform: translate(3px, -2px); text-shadow: -2px 0 red, 2px 0 blue; }
            44% { opacity: 0; transform: translate(0); }
            96% { opacity: 0; transform: translate(0); }
            98% { opacity: 1; transform: translate(-2px, -2px); text-shadow: 2px 0 red, -2px 0 blue; }
            100% { opacity: 0; transform: translate(0); }
        }

        .glitch-text::before {
            animation: glitch-anim 6s infinite;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 40px;
            border: 1px solid #dcdcdc;
            box-shadow: 5px 5px 0px #e0e0e0;
            position: relative;
        }

        .logo-seal {
            border: 4px double #333333;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            border-radius: 50%;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        h2 {
            border-bottom: 2px solid #333333;
            padding-bottom: 8px;
            margin-top: 30px;
            color: #1a1a1a;
        }

        .meta-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: #fafafa;
        }

        .meta-table th, .meta-table td {
            border: 1px solid #cccccc;
            padding: 12px;
            text-align: left;
        }

        .meta-table th {
            background-color: #eaeaea;
            width: 25%;
            font-weight: bold;
        }

        /* 검은색 마스킹 텍스트 */
        .classified {
            background-color: #000000;
            color: #000000;
            padding: 0 4px;
            cursor: crosshair;
            transition: color 0.3s;
            user-select: none;
        }
        
        .classified:hover {
            color: #ff0000;
            text-shadow: 0 0 3px #ff0000;
        }

        /* 유령 에러 팝업창 */
        .error-popup {
            position: fixed;
            bottom: 20px;
            right: -350px;
            width: 300px;
            background-color: #111111;
            border-left: 4px solid #ff0000;
            color: #ff3333;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(255,0,0,0.2);
            animation: slide-in-out 12s infinite;
            animation-delay: 5s; /* 로딩 이후에 나타나도록 딜레이 */
            z-index: 100;
        }

        @keyframes slide-in-out {
            0%, 70% { right: -350px; }
            75%, 95% { right: 20px; }
            100% { right: -350px; }
        }

        .error-popup strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            text-shadow: 0 0 4px rgba(255,51,51,0.5);
        }

        footer {
            text-align: center;
            margin: 60px 0 30px 0;
            font-size: 11px;
            color: #aaaaaa;
        }
    </style>
</head>
