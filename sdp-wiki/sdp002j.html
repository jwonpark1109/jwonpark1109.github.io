<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="error-handler.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP-002-J - 최상위 기밀 문서</title>
    <style>
        body {
            background-color: #000;
            color: #d4d4d4;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        /* 기밀 경고문 박스 */
        .warning-box {
            border: 4px solid #8b0000;
            background-color: #120000;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.6);
            border-radius: 2px;
        }
        .warning-box h1 {
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .warning-box p {
            color: #ff8888;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 10px 0;
        }
        
        /* 생체 인증 버튼 스타일 */
        .auth-btn {
            background-color: #8b0000;
            color: #fff;
            border: 2px solid #ff3333;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .auth-btn:hover {
            background-color: #ff3333;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8);
            color: #000;
        }

        /* 스크롤용 공백 영역 */
        .spacer {
            height: 50vh;
        }

        /* 권한 부족 메시지 (기본 상태: 숨김 + 투명도 0) */
        .error-message {
            display: none;
            opacity: 0;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            transition: opacity 1s ease-in-out; /* 1초 동안 부드럽게 나타남 */
            margin: 40px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="warning-box">
            <h1>경고: 1등급 기밀</h1>
            <p>이하의 문서는 SDP 재단 최고 관리자(O5 등급) 전용으로 분류되어 있습니다.</p>
            <p>인가되지 않은 자가 이 문서에 접근할 경우 치명적인 밈적 살해 에이전트가 작동하며, 즉각적인 처분이 이루어집니다.</p>
            <p>아래 버튼을 눌러 생체 인증을 진행한 뒤 문서를 열람하십시오.</p>
            
            <button class="auth-btn" onclick="startAuth()">[ 생체 인증 진행 ]</button>
        </div>

        <!-- 스크롤을 만들어주기 위한 공간 -->
        <div class="spacer"></div>

        <!-- 결과 메시지 영역 -->
        <div id="denied-msg" class="error-message">
            권한이 부족합니다.
        </div>
        
        <div class="spacer"></div>
    </div>

    <script>
        function startAuth() {
            const msg = document.getElementById('denied-msg');
            
            // 1. 요소를 보이게 전환 (아직 투명함)
            msg.style.display = 'block';
            
            // 2. 부드럽게 메시지 위치로 스크롤
            msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 3. 브라우저가 처리를 마친 후 투명도를 조절해 페이드 인 효과 적용
            setTimeout(() => {
                msg.style.opacity = '1';
            }, 100);
        }
    </script>

</body>
</html>
