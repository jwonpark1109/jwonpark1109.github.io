<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 재단 - 일반 데이터베이스</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --text-color: #ccc;
            --sdg-green: #99ff00;
            --border-color: #222;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--sdg-green);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo {
            width: 50px;
            filter: drop-shadow(0 0 5px rgba(153, 255, 0, 0.5));
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 2px;
        }
        .back-home {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .back-home:hover {
            color: var(--sdg-green);
        }
        
        /* 리스트 레이아웃 */
        .db-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .db-card {
            background-color: #111316;
            border: 1px solid var(--border-color);
            padding: 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: desert 0.3s, transform 0.2s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .db-card:hover {
            border-color: var(--sdg-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(153, 255, 0, 0.1);
        }
        .db-card .item-number {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .db-card:hover .item-number {
            color: var(--sdg-green);
        }
        .db-card .item-name {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 15px;
        }
        .db-card .item-class {
            font-size: 0.85rem;
            padding: 3px 8px;
            background-color: #222;
            align-self: flex-start;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* 등급별 색상 부여 */
        .class-apollyon { color: #ff3333; border: 1px solid #ff3333; }
        .class-euclid { color: #ffcc00; border: 1px solid #ffcc00; }
        .class-keter { color: #ff3333; border: 1px solid #ff3333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-title">
                <img src="images/sdgicon.png" alt="SDG Logo" class="logo">
                <h1>일반 데이터베이스 색인</h1>
            </div>
            <a href="index.html" class="back-home">< 메인 터미널</a>
        </div>

        <div class="db-grid">
            <a href="sdg001.html" class="db-card">
                <div>
                    <div class="item-number">SDG-001</div>
                    <div class="item-name">S.D. 라크의 제안</div>
                </div>
                <div class="item-class class-apollyon">Apollyon</div>
            </a>

            <a href="sdg102.html" class="db-card">
                <div>
                    <div class="item-number">SDG-102</div>
                    <div class="item-name">공포의 도형</div>
                </div>
                <div class="item-class class-euclid">Euclid</div>
            </a>

            <div class="db-card" style="opacity: 0.3; cursor: not-allowed;">
                <a href="sdg666.html" class="db-card">
                    <div>
                        <div class="item-number">SDG-666</div>
                        <div class="item-name">얼굴 수집가</div>
                    </div>
                    <div class="item-class class-keter">Keter</div>
                </a> 
            </div>
                <div class="item-class">Pending</div>
        </div>
    </div>

</body>
</html>
