<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 재단 - 메인 데이터베이스</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #d4d4d4;
            --accent-color: #b30000;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
            width: 80%;
            max-width: 800px;
        }
        /* 로고 스타일 추가 */
        .sdg-logo {
            width: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(153, 255, 0, 0.4)); /* 연두색 네온 효과 */
        }
        .header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 10px rgba(179, 0, 0, 0.5);
        }
        .header p {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: bold;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 80%;
            max-width: 800px;
        }
        .menu-item {
            background-color: rgba(15, 15, 15, 0.8);
            border: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(179, 0, 0, 0.3), transparent);
            transition: left 0.4s ease;
        }
        .menu-item:hover {
            border-color: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(179, 0, 0, 0.4), inset 0 0 10px rgba(179, 0, 0, 0.2);
        }
        .menu-item:hover::before {
            left: 100%;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/sdgicon.png" alt="SDG Foundation Logo" class="sdg-logo">
        <h1>SDG FOUNDATION</h1>
        <p>확보, 격리, 보호</p>
    </div>
    <div class="menu-container">
        <a href="sdg001.html" class="menu-item">[ SDG-001 제안 ]</a>
        <a href="#" class="menu-item">[ 일반 데이터베이스 ]</a>
        <a href="#" class="menu-item">[ 보안 인가 터미널 ]</a>
        <a href="#" class="menu-item">[ 임직원 전용망 ]</a>
    </div>
    <div class="footer">
        경고: 인가되지 않은 접근은 즉각적인 추적 및 처분의 대상이 됩니다.
    </div>
</body>
</html>
