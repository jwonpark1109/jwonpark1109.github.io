<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실 - 파일 목록</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .list-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: #ff4d4d;
            border-bottom: 2px solid rgba(255, 77, 77, 0.3);
            padding-bottom: 15px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 77, 77, 0.4);
            transform: translateX(5px);
        }

        .file-link {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            text-decoration: none;
            color: #eee;
            font-weight: 500;
        }

        .file-icon {
            margin-right: 15px;
            font-size: 20px;
        }

        .file-info {
            flex-grow: 1;
        }

        .file-name {
            display: block;
            font-size: 16px;
        }

        .file-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .arrow {
            color: #ff4d4d;
            font-weight: bold;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="list-container">
        <h1>다운로드 센터</h1>
        
        <ul class="file-list" id="file-list-container">
            <!-- 자바스크립트에서 목록을 생성합니다 -->
        </ul>

        <footer>
            © 2026 Secure File Server
        </footer>
    </div>

    <script>
        // 1. 이곳에 다운로드할 파일 목록을 입력하세요
        const files = [
            { name: "setup_v1.0.exe", size: "15.4 MB", date: "2026-05-10" },
            { name: "manual_korean.pdf", size: "2.1 MB", date: "2026-05-11" },
            { name: "important_data.zip", size: "128 MB", date: "2026-05-12" }
        ];

        const listContainer = document.getElementById('file-list-container');

        // 2. 파일 목록을 화면에 그리는 함수
        files.forEach(file => {
            const li = document.createElement('li');
            li.className = 'file-item';
            
            // 클릭 시 files/index.html?name=파일명 으로 리다이렉트
            li.innerHTML = `
                <a href="files/?name=${encodeURIComponent(file.name)}" class="file-link">
                    <span class="file-icon">📁</span>
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="file-meta">${file.size} | ${file.date}</span>
                    </div>
                    <span class="arrow">→</span>
                </a>
            `;
            listContainer.appendChild(li);
        });
    </script>
</body>
</html>
