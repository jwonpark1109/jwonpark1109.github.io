<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전한 다운로드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        /* 프로그레스 바 스타일 */
        .progress-wrapper {
            margin: 30px 0;
            display: block;
        }
        .progress-text {
            font-size: 16px;
            margin-bottom: 10px;
            color: #aaa;
        }
        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8e8e);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* 에러 UI (기본 숨김) */
        #error-ui { display: none; }
        .error-icon { font-size: 80px; margin-bottom: 20px; display: block; animation: shake 0.8s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* 공통 텍스트 스타일 */
        h1 { font-size: 28px; margin-bottom: 10px; }
        .filename-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #eee;
        }

        /* 버튼 스타일 */
        .button-group {
            margin-top: 30px;
            display: none; /* 완료 시에만 노출 */
        }
        .btn {
            display: inline-block;
            background: #ff4d4d;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 77, 77, 0.3); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 15px;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        .details {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            margin: 20px 0;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 다운로드 중 UI -->
        <div id="download-ui">
            <h1 id="status-title">파일 다운로드 중...</h1>
            <span class="filename-badge" id="display-filename">파일을 찾는 중</span>

            <div class="progress-wrapper">
                <div class="progress-text"><span id="percent">0</span>% 완료</div>
                <div class="progress-bg">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </div>

        <!-- 에러 발생 시 UI -->
        <div id="error-ui">
            <span class="error-icon">⚠️</span>
            <h1 style="color: #ff4d4d;">다운로드 실패</h1>
            <div class="details">
                <p>• 사유: 파일을 찾을 수 없거나 서버 연결에 실패했습니다.</p>
                <p>• 요청 시간: <span id="error-time"></span></p>
            </div>
            <button onclick="location.reload()" class="btn">다시 시도하기</button>
        </div>

        <!-- 완료 후 버튼 그룹 -->
        <div class="button-group" id="success-buttons">
            <p style="margin-bottom: 20px; color: #4ade80;">✓ 다운로드 요청이 완료되었습니다.</p>
            <button onclick="goBack()" class="btn btn-secondary">이전 페이지로 돌아가기</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('name');
        const FILE_PATH = `../files/${fileName}`;

        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                location.href = "/"; // 이전 페이지가 없으면 메인으로
            }
        }

        async function startDownload() {
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('percent');
            const statusTitle = document.getElementById('status-title');
            const successButtons = document.getElementById('success-buttons');
            const downloadUI = document.getElementById('download-ui');
            const errorUI = document.getElementById('error-ui');
            const displayFilename = document.getElementById('display-filename');

            if (!fileName) {
                showError();
                return;
            }

            displayFilename.textContent = fileName;

            try {
                const response = await fetch(FILE_PATH);
                
                if (!response.ok) throw new Error('Network response was not ok');

                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                
                // Content-Length 정보가 없는 경우 프로그레스 바 대신 무한 로딩 처리
                if (!contentLength) {
                    progressBar.style.width = '100%';
                    percentText.textContent = '100';
                }

                let receivedLength = 0;
                let chunks = []; 

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    receivedLength += value.length;

                    if (contentLength) {
                        let step = Math.round((receivedLength / contentLength) * 100);
                        progressBar.style.width = step + '%';
                        percentText.textContent = step;
                    }
                }

                // 다운로드 완료 처리
                statusTitle.textContent = "다운로드 완료";
                successButtons.style.display = "block";

                // 파일 합쳐서 실제 다운로드 트리거
                let blob = new Blob(chunks);
                let downloadUrl = URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = downloadUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(downloadUrl);

            } catch (err) {
                showError();
            }
        }

        function showError() {
            document.getElementById('download-ui').style.display = 'none';
            document.getElementById('error-ui').style.display = 'block';
            document.getElementById('error-time').textContent = new Date().toLocaleString();
        }

        window.onload = startDownload;
    </script>
</body>
</html>
