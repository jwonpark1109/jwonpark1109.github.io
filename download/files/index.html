<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다운로드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 60px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        /* 프로그레스 바 스타일 */
        .progress-wrapper { margin: 30px 0; display: block; }
        .progress-text { font-size: 16px; margin-bottom: 10px; color: #aaa; }
        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 12px; border-radius: 10px; overflow: hidden; position: relative;
        }
        #progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8e8e);
            transition: width 0.2s ease-out, background 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        /* 에러 UI (기본 숨김) */
        #error-ui { display: none; }
        .error-icon { font-size: 80px; margin-bottom: 20px; display: block; animation: shake 0.8s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        h1 { font-size: 28px; margin-bottom: 10px; transition: color 0.3s ease; }
        .filename-badge {
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px;
            border-radius: 20px; font-size: 14px; color: #eee; display: inline-block;
        }

        .details {
            background: rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 15px;
            text-align: left; font-size: 14px; margin: 20px 0; color: #ccc;
            word-break: break-all;
        }

        /* 버튼 스타일 */
        .button-group { margin-top: 30px; display: none; }
        .btn {
            display: inline-block; background: #ff4d4d; color: white; padding: 14px 30px;
            border-radius: 50px; text-decoration: none; font-weight: 700; cursor: pointer; border: none;
            transition: all 0.3s ease; font-size: 15px; margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 77, 77, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); box-shadow: none; }
        .btn-dump { background: #ffaa00; color: #000; }
        .btn-dump:hover { box-shadow: 0 10px 20px rgba(255, 170, 0, 0.3); }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 다운로드 중 UI -->
        <div id="download-ui">
            <h1 id="status-title">파일 다운로드 중...</h1>
            <span class="filename-badge" id="display-filename">파일 확인 중</span>

            <div class="progress-wrapper">
                <div class="progress-text"><span id="percent">0</span>% 완료</div>
                <div class="progress-bg">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </div>

        <!-- 에러 발생 시 UI -->
        <div id="error-ui">
            <span class="error-icon">⚠️</span>
            <h1 style="color: #ff4d4d;">다운로드 차단됨</h1>
            <div class="details">
                <p><strong>사유:</strong> <span id="error-reason">파일을 찾을 수 없거나 접근할 수 없습니다.</span></p>
                <p><strong>요청 시간:</strong> <span id="error-time"></span></p>
            </div>
            <div>
                <button onclick="location.reload()" class="btn">다시 시도</button>
                <button onclick="downloadDump()" class="btn btn-dump">오류 덤프 저장</button>
                <button onclick="goBack()" class="btn btn-secondary">돌아가기</button>
            </div>
        </div>

        <!-- 완료 후 버튼 그룹 -->
        <div class="button-group" id="success-buttons">
            <p style="margin-bottom: 20px; color: #4ade80; font-weight: bold;">✓ 다운로드 요청이 완료되었습니다.</p>
            <button onclick="goBack()" class="btn btn-secondary">이전 페이지로 돌아가기</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('name');
        const FILE_PATH = `https://jwonpark1109.github.io/download/files/${fileName}`; 
        
        let lastErrorDetails = ""; 
        let fileSettings = null; // 추출된 파일 설정을 담을 변수

        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                location.href = "../"; 
            }
        }

        async function startDownload() {
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('percent');
            const statusTitle = document.getElementById('status-title');
            const successButtons = document.getElementById('success-buttons');
            const displayFilename = document.getElementById('display-filename');

            if (!fileName) {
                showError("잘못된 접근입니다. (파일 이름 누락)");
                return;
            }

            displayFilename.textContent = fileName;

            try {
                const response = await fetch(FILE_PATH);
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);

                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/html') && !fileName.toLowerCase().endsWith('.html')) {
                    throw new Error('서버가 실제 파일 대신 HTML을 반환했습니다.');
                }

                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                
                let receivedLength = 0;
                let chunks = []; 
                let isFirstChunk = true;

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;

                    let chunkData = value;

                    // 첫 번째 청크에서 JSON 설정 파싱 시도
                    if (isFirstChunk && chunkData.length > 0) {
                        isFirstChunk = false;
                        
                        // 파일이 '{' (ASCII 123) 로 시작하는지 확인
                        if (chunkData[0] === 123) {
                            const newlineIdx = chunkData.indexOf(10); // '\n' (ASCII 10) 위치 찾기
                            
                            if (newlineIdx !== -1) {
                                const textDecoder = new TextDecoder('utf-8');
                                const firstLine = textDecoder.decode(chunkData.slice(0, newlineIdx));
                                
                                // 설정 객체인지 확인
                                if (firstLine.includes('"download-settings"')) {
                                    try {
                                        const parsed = JSON.parse(firstLine);
                                        if (parsed["download-settings"]) {
                                            fileSettings = parsed["download-settings"];
                                            // ★ 핵심: 파싱된 첫 번째 줄(설정)을 제외한 나머지 데이터만 잘라서 저장 (파일 오염 방지)
                                            chunkData = chunkData.slice(newlineIdx + 1);
                                        }
                                    } catch (e) {
                                        console.warn("파일 설정 파싱 실패 (일반 파일로 취급):", e);
                                    }
                                }
                            }
                        }
                    }

                    // 파일 설정에 따른 실시간 제어
                    if (fileSettings) {
                        // 강제 다운로드(not-error)가 true가 "아닐 때만" 오류 처리
                        if (fileSettings["not-error"] !== "true") {
                            
                            if (fileSettings["error"] === "true") {
                                reader.cancel(); // 다운로드 즉시 중단
                                throw new Error(`강제 시스템 오류 (오류 코드: ERROR_${fileSettings["error-code"] || "UNKNOWN"})`);
                            }
                            
                            if (fileSettings["not-download"] === "true") {
                                reader.cancel(); // 다운로드 즉시 중단
                                throw new Error(`보안 시스템에 의해 차단되었습니다. (접근 불가 파일)`);
                            }
                        }

                        // 프로그레스 바 색상 변경
                        if (fileSettings["prograss-color"]) {
                            progressBar.style.background = fileSettings["prograss-color"];
                        }
                    }

                    if (chunkData.length > 0) {
                        chunks.push(chunkData);
                        receivedLength += chunkData.length;
                    }

                    // 진행률 업데이트 (설정이 잘려나갔으므로 오차가 살짝 생길 수 있으나 육안으로 구분 불가)
                    if (contentLength) {
                        let step = Math.min(Math.round((receivedLength / contentLength) * 100), 100);
                        progressBar.style.width = step + '%';
                        percentText.textContent = step;
                    }
                }

                // 다운로드 완료 시점 제어
                statusTitle.textContent = "다운로드 완료";
                if (fileSettings && fileSettings["text-color"]) {
                    statusTitle.style.color = fileSettings["text-color"];
                }
                successButtons.style.display = "block";

                // 설정 파일을 제외한 순수 데이터만 병합하여 실제 파일로 생성
                let blob = new Blob(chunks);
                let downloadUrl = URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = downloadUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(downloadUrl);

            } catch (err) {
                showError(err.message);
            }
        }

        // 에러 표시
        function showError(errorMsg = "네트워크 연결 실패 또는 파일을 찾을 수 없습니다.") {
            document.getElementById('download-ui').style.display = 'none';
            document.getElementById('error-ui').style.display = 'block';
            
            const now = new Date();
            document.getElementById('error-time').textContent = now.toLocaleString();
            document.getElementById('error-reason').textContent = errorMsg;
            
            lastErrorDetails = `[DOWNLOAD ERROR DUMP]\n` +
                               `Time: ${now.toISOString()}\n` +
                               `Requested File: ${fileName}\n` +
                               `Target Path: ${FILE_PATH}\n` +
                               `Error Message: ${errorMsg}\n` +
                               `Parsed Settings: ${JSON.stringify(fileSettings || "None")}\n` +
                               `User Agent: ${navigator.userAgent}\n` +
                               `Current URL: ${window.location.href}`;
        }

        function downloadDump() {
            if (!lastErrorDetails) return;
            const blob = new Blob([lastErrorDetails], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `error_dump_${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = startDownload;
    </script>
</body>
</html>
