<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Internal Server Error</title>
    
    <style>
        :root {
            --bg-color: #f2f4f5;
            --container-bg: #ffffff;
            --text-main: #393b3d;
            --text-sub: #65676b;
            --debug-bg: #f9f9f9;
            --debug-border: #eeeeee;
            --btn-primary-bg: #111111;
            --btn-primary-text: #ffffff;
        }

        body.dark-mode {
            --bg-color: #191b1d;
            --container-bg: #232527;
            --text-main: #ffffff;
            --text-sub: #b8b8b8;
            --debug-bg: #1a1c1e;
            --debug-border: #333537;
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #111111;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; transition: 0.3s;
        }

        .container { 
            background: var(--container-bg); 
            width: 90%; max-width: 400px; padding: 40px; 
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            text-align: center;
        }

        /* --- 아이콘(라벨) 노출 제어 --- */
        .icon-container img {
            max-width: 150px;
            height: auto;
            margin-bottom: 20px;
            display: none; /* 기본적으로 모두 숨김 */
        }

        /* 화이트 모드일 때 label_white만 표시 */
        body:not(.dark-mode) #label_white { display: inline-block; }

        /* 다크 모드일 때 label_black만 표시 */
        body.dark-mode #label_black { display: inline-block; }

        /* 테마 전환 버튼 스타일 */
        .theme-switch-group { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn {
            font-size: 12px; cursor: pointer; padding: 5px 10px;
            border: 1px solid #adb0b1; border-radius: 15px; color: var(--text-sub);
        }

        h1 { color: var(--text-main); font-size: 24px; }
        p { color: var(--text-sub); line-height: 1.5; margin-bottom: 25px; }
        
        .debug-box {
            font-family: monospace; font-size: 11px; color: #a1a3a7;
            background: var(--debug-bg); padding: 12px; border: 1px solid var(--debug-border);
            text-align: left; white-space: pre-wrap; margin-bottom: 20px;
            max-height: 100px; overflow-y: auto;
        }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; border: none; display: block; margin-top: 10px;
        }
        .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-text); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <img src="https://jwonpark1109.github.io/rblxerror/images/label_black.svg" id="label_white" alt="Roblox White">
            <img src="https://jwonpark1109.github.io/rblxerror/images/label_white.svg" id="label_black" alt="Roblox Black">
        </div>

        <div class="theme-switch-group">
            <span class="mode-btn" onclick="document.body.classList.remove('dark-mode')">Light</span>
            <span class="mode-btn" onclick="document.body.classList.add('dark-mode')">Dark</span>
        </div>
        
        <h1>우리는 더 나은 Roblox를 만들고 있어요!</h1>
        <p>일시적으로 접속이 불가능합니다.<br>나중에 다시 시도해 주세요.</p>
        
        <div class="debug-box" id="debug">Error code: 500 - Internal Server Error...</div>

        <button class="btn btn-primary" onclick="retry(this)">재시도</button>
    </div>

    <script>
        function retry(btn) {
            btn.disabled = true;
            let dots = 0;
            const ani = setInterval(() => {
                dots = (dots + 1) % 4;
                btn.innerText = "연결 시도 중" + ".".repeat(dots);
            }, 400);
            setTimeout(() => { clearInterval(ani); location.reload(); }, 2000);
        }
    </script>
</body>
</html>
