<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Status</title>

    <meta property="og:title" content="Roblox System Status">
    <meta property="og:description" content="현재 로블록스 서버의 실시간 상태를 확인하세요.">
    <meta property="og:image" content="https://jwonpark1109.github.io/rblxerror/images/label_white.svg">
    <meta property="og:url" content="https://jwonpark1109.github.io/rblxerror/status/">
    <meta property="og:type" content="website">

    <link rel="icon" href="https://jwonpark1109.github.io/rblxerror/images/icon.svg" type="image/x-icon">

    <style>
        :root {
            --bg-color: #f2f4f5;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #393b3d;
            --text-sub: #65676b;
            --border-color: #dee1e2;
            
            /* 상태별 색상 (라이트 모드) */
            --status-ok: #00b06f;
            --status-ok-bg: rgba(0, 176, 111, 0.1);
            --status-warn: #f68b1e;
            --status-warn-bg: rgba(246, 139, 30, 0.1);
            --status-error: #f44336;
            --status-error-bg: rgba(244, 67, 54, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191b1d;
                --header-bg: #232527;
                --card-bg: #232527;
                --text-main: #ffffff;
                --text-sub: #b8b8b8;
                --border-color: #333537;

                /* 상태별 색상 (다크 모드 최적화) */
                --status-ok-bg: rgba(0, 176, 111, 0.2);
                --status-warn-bg: rgba(246, 139, 30, 0.2);
                --status-error-bg: rgba(244, 67, 54, 0.2);
            }
            #label_white { display: none !important; }
            #label_black { display: inline-block !important; }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            transition: background-color 0.3s ease;
        }

        header {
            background: var(--header-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .logo img { height: 30px; display: none; }
        #label_white { display: inline-block; }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-status {
            background: var(--status-error);
            color: white;
            padding: 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(244, 67, 54, 0.3);
        }

        .service-list {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        /* 탭(행) 스타일링 */
        .service-item {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
        }
        .service-item:last-child { border-bottom: none; }

        /* 배경색 클래스 연동 */
        .item-error { background-color: var(--status-error-bg); }
        .item-warn { background-color: var(--status-warn-bg); }
        .item-ok { background-color: var(--status-ok-bg); }

        .service-name { font-weight: 600; font-size: 16px; }
        
        .status-text { font-size: 14px; font-weight: bold; }
        .status-ok { color: var(--status-ok); }
        .status-warn { color: var(--status-warn); }
        .status-error { color: var(--status-error); }

        .update-time {
            margin-top: 15px;
            font-size: 12px;
            color: var(--text-sub);
            text-align: right;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 30px;
        }
        .back-btn {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.2s;
        }
        .back-btn:hover { background: var(--header-bg); color: var(--text-main); }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://jwonpark1109.github.io/rblxerror/images/label_white.svg" id="label_white" alt="Roblox">
        <img src="https://jwonpark1109.github.io/rblxerror/images/label_black.svg" id="label_black" alt="Roblox">
    </div>
    <div style="font-weight: bold; font-size: 14px;">System Status</div>
</header>

<div class="container">
    <div class="main-status" id="main-banner">
        <span>전체적으로 오류 발생</span>
        <span style="font-size: 14px; opacity: 0.9;">⚠️</span>
    </div>

    <div class="service-list">
        <div class="service-item item-error">
            <span class="service-name">사용자 접속</span>
            <span class="status-text status-error">ERROR</span>
        </div>
        <div class="service-item item-error">
            <span class="service-name">게임 플레이</span>
            <span class="status-text status-error">ERROR</span>
        </div>
        <div class="service-item item-warn">
            <span class="service-name">스튜디오/만들기</span>
            <span class="status-text status-warn">Upload Error</span>
        </div>
        <div class="service-item item-error">
            <span class="service-name">홈페이지</span>
            <span class="status-text status-error">ERROR</span>
        </div>
        <div class="service-item item-warn">
            <span class="service-name">아바타 편집</span>
            <span class="status-text status-warn">Save Error</span>
        </div>
    </div>

    <div class="update-time">
        Last updated: <span id="current-time"></span>
    </div>
</div>

<footer>
    <a href="https://jwonpark1109.github.io/rblxerror/" class="back-btn">홈 페이지로 돌아가기</a>
</footer>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleString('ko-KR', { 
            timeZone: 'Asia/Seoul',
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        }) + " (KST)";
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
