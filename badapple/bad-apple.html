<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bad Apple ASCII Player</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* 스크롤바 절대 방지 */
        }
        body {
            color: #fff;
            /* 영어 아스키 아트에 최적화된 고정폭 폰트 */
            font-family: 'Courier New', Consolas, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #btn-start {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.2s;
            z-index: 10;
        }
        #btn-start:hover {
            background: #ccc;
        }
        #ascii-container {
            display: inline-block;
            white-space: pre;       
            font-weight: bold;
            text-align: left;
            /* 하드웨어 가속을 활용해 글자가 바뀔 때 밀리는 현상 방지 */
            transform: translateZ(0); 
        }
    </style>
</head>
<body>

    <button id="btn-start">🍎 Play Bad Apple 🍎</button>
    <div id="ascii-container">Click the button to start ASCII Bad Apple!</div>

    <video id="video" loop muted playsinline style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="audio" loop style="display:none;">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('ascii-container');
        const btnStart = document.getElementById('btn-start');

        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let WIDTH = 150;
        let HEIGHT = 50;
        
        // [수정] 영어 표준 70단계 명암 배열 (어두운 곳 ' '부터 가장 밝은 곳 '$', '@'까지)
        const asciiChars = "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ";
        // 배드애플은 원래 검은 배경에 흰 실루엣이므로, 이를 그대로 표현하기 위해 배열을 뒤집어서 매핑합니다.
        const revChars = asciiChars.split("").reverse().join("");

        /* [핵심 수정] 영어 폰트 비율(약 1:2)을 계산하여 줄 밀림을 완전히 해결하는 함수 */
        function resizeResponsive() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 1. 창 크기에 따른 동적 폰트 사이즈 설정
            let fontSize = Math.max(5, Math.floor(windowWidth / 180)); 
            if (fontSize > 12) fontSize = 12; // 너무 커지면 줄바꿈이 일어날 수 있으므로 제한

            container.style.fontSize = `${fontSize}px`;
            
            // 영어 고정폭 폰트(Courier New)의 완벽한 렌더링 비율 세팅
            container.style.lineHeight = "1.0"; 
            container.style.letterSpacing = "0px"; 

            // 2. 가로세로 글자 수 비율 보정 (영어는 가로가 좁고 세로가 길기 때문에 가로 글자 수를 늘려야 안 찌그러집니다)
            // 영어 폰트의 가로:세로 비율인 약 0.55~0.6을 반영하여 계산
            WIDTH = Math.floor(windowWidth / (fontSize * 0.55));
            HEIGHT = Math.floor(windowHeight / fontSize) - 2; // 여유 공간 확보로 아래로 밀림 방지

            // 원본 영상의 4:3 비율이 깨지지 않도록 높이값 최종 조절
            const targetHeight = Math.floor(WIDTH * 0.38); 
            if (HEIGHT > targetHeight) {
                HEIGHT = targetHeight;
            } else {
                WIDTH = Math.floor(HEIGHT / 0.38);
            }

            // 과부하 방지를 위한 최대 해상도 제한
            if (WIDTH > 280) {
                WIDTH = 280;
                HEIGHT = Math.floor(WIDTH * 0.38);
            }

            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }

        // 초기 실행 및 리사이즈 감지
        resizeResponsive();
        window.addEventListener('resize', resizeResponsive);

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            
            Promise.all([video.play(), audio.play()]).then(() => {
                renderFrame();
            }).catch(err => {
                container.textContent = "Playback failed. Please check file paths and server environment.";
                console.error(err);
            });
        });

        function renderFrame() {
            if (video.paused || video.ended) return;

            // 싱크 밀림 방지
            if (Math.abs(video.currentTime - audio.currentTime) > 0.15) {
                video.currentTime = audio.currentTime;
            }

            ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
            
            try {
                const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
                const pixels = imgData.data;
                let asciiArt = "";

                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        const idx = (y * WIDTH + x) * 4;
                        const r = pixels[idx];
                        const g = pixels[idx + 1];
                        const b = pixels[idx + 2];

                        // 고정밀 루미넌스 밝기 계산
                        const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                        // 영어 아스키 캐릭터 매핑
                        const charIdx = Math.floor((brightness / 255) * (revChars.length - 1));
                        asciiArt += revChars[charIdx];
                    }
                    asciiArt += "\n";
                }

                container.textContent = asciiArt;
                
            } catch (e) {
                container.textContent = "CORS Error or Canvas Tainted.";
                console.error(e);
                return;
            }

            requestAnimationFrame(renderFrame);
        }
    </script>
</body>
</html>
</html>
