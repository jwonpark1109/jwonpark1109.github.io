<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bad Apple ASCII Player</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        body {
            color: #fff;
            font-family: 'Courier New', Consolas, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #btn-start {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.2s;
            z-index: 10;
        }
        #btn-start:hover {
            background: #ccc;
        }
        #ascii-container {
            display: inline-block;
            white-space: pre;       
            font-weight: bold;
            text-align: left;
            transform: translateZ(0); 
        }
    </style>
</head>
<body>

    <button id="btn-start">🍎Play Bad Apple</button>
    <div id="ascii-container">Click the button to start ASCII Bad Apple!</div>

    <video id="video" loop muted playsinline style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="audio" loop style="display:none;">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('ascii-container');
        const btnStart = document.getElementById('btn-start');

        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let WIDTH = 150;
        let HEIGHT = 50;
        
        const asciiChars = "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ";
        const revChars = asciiChars.split("").reverse().join("");

        function resizeResponsive() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            let fontSize = Math.max(5, Math.floor(windowWidth / 180)); 
            if (fontSize > 12) fontSize = 12;

            container.style.fontSize = `${fontSize}px`;
            
            container.style.lineHeight = "1.0"; 
            container.style.letterSpacing = "0px"; 

            WIDTH = Math.floor(windowWidth / (fontSize * 0.55));
            HEIGHT = Math.floor(windowHeight / fontSize) - 2;

            const targetHeight = Math.floor(WIDTH * 0.38); 
            if (HEIGHT > targetHeight) {
                HEIGHT = targetHeight;
            } else {
                WIDTH = Math.floor(HEIGHT / 0.38);
            }

            if (WIDTH > 280) {
                WIDTH = 280;
                HEIGHT = Math.floor(WIDTH * 0.38);
            }

            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }

        resizeResponsive();
        window.addEventListener('resize', resizeResponsive);

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            
            Promise.all([video.play(), audio.play()]).then(() => {
                renderFrame();
            }).catch(err => {
                container.textContent = "Playback failed. Please check file paths and server environment.";
                console.error(err);
            });
        });

        function renderFrame() {
            if (video.paused || video.ended) return;

            if (Math.abs(video.currentTime - audio.currentTime) > 0.15) {
                video.currentTime = audio.currentTime;
            }

            ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
            
            try {
                const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
                const pixels = imgData.data;
                let asciiArt = "";

                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        const idx = (y * WIDTH + x) * 4;
                        const r = pixels[idx];
                        const g = pixels[idx + 1];
                        const b = pixels[idx + 2];

                        const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                        const charIdx = Math.floor((brightness / 255) * (revChars.length - 1));
                        asciiArt += revChars[charIdx];
                    }
                    asciiArt += "\n";
                }

                container.textContent = asciiArt;
                
            } catch (e) {
                container.textContent = "CORS Error or Canvas Tainted.";
                console.error(e);
                return;
            }

            requestAnimationFrame(renderFrame);
        }
    </script>
</body>
</html>
</html>
