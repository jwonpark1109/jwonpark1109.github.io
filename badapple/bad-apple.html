<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 배드애플 플레이어 (반응형)</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* 스크롤바 방지 */
        }
        body {
            color: #fff;
            font-family: 'GulimChe', 'DotumChe', 'Courier New', monospace;
            /* line-height와 letter-spacing은 폰트 크기에 맞춰 자바스크립트로 동적 제어합니다 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #btn-start {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.2s;
            z-index: 10; /* 텍스트 위에 오도록 설정 */
        }
        #btn-start:hover {
            background: #ccc;
        }
        #ascii-container {
            display: inline-block;
            white-space: pre;       
            font-weight: bold;
            text-align: left; /* 아스키 아트 정렬 */
        }
    </style>
</head>
<body>

    <button id="btn-start">🍎 배드애플 재생 🍎</button>
    <div id="ascii-container">버튼을 누르면 한글로 이루어진 배드애플이 시작됩니다!</div>

    <video id="video" loop muted playsinline style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="audio" loop style="display:none;">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('ascii-container');
        const btnStart = document.getElementById('btn-start');

        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 실시간으로 변할 해상도 변수 선언
        let WIDTH = 150;
        let HEIGHT = 68;
        
        // 한글 밀도 단계 배열
        const krChars = [
            " ", "ㅡ", "ㄱ", "ㄴ", "ㅅ", "ㅇ", "ㅈ", "ㅂ", "ㅋ", "ㅌ", 
            "ㅍ", "ㅎ", "가", "거", "고", "구", "민", "정", "음", "뷁", "뾿"
        ];

        /* [핵심 기능] 창 크기에 맞춰 해상도와 폰트 스타일을 실시간으로 계산하는 함수 */
        function resizeResponsive() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 1. 창 크기에 맞는 적절한 글자 크기(Font Size) 결정
            // 화면이 작아지면 글자도 작아지고, 화면이 커지면 글자도 커집니다.
            let fontSize = Math.max(7, Math.floor(windowWidth / 130)); 
            if (fontSize > 14) fontSize = 14; // 너무 커지면 깨지므로 최대치 제한

            // 2. 글자 크기에 따른 CSS 줄간격 및 자간 실시간 조정
            container.style.fontSize = `${fontSize}px`;
            container.style.lineHeight = "0.72"; 
            container.style.letterSpacing = `-${fontSize * 0.18}px`; // 글자 크기에 비례한 자간 축소

            // 3. 현재 창 크기에서 해당 글자 크기로 채울 수 있는 최적의 가로/세로 글자 수 계산
            // 원본 배드애플의 4:3 비율과 한글 폰트 특성(가로세로 비율 약 2.2:1)을 고려하여 보정
            WIDTH = Math.floor(windowWidth / (fontSize * 0.55));
            HEIGHT = Math.floor(windowHeight / (fontSize * 0.72));

            // 지나치게 해상도가 높아져 성능이 떨어지는 것을 방지하기 위한 최대치 제한
            if (WIDTH > 240) {
                WIDTH = 240;
                HEIGHT = Math.floor(WIDTH * 0.45);
            }

            // 캔버스 크기도 변경된 해상도에 맞게 동적 업데이트
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }

        // 초기 실행 및 창 크기 변경(resize) 이벤트 리스너 등록
        resizeResponsive();
        window.addEventListener('resize', resizeResponsive);

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            
            Promise.all([video.play(), audio.play()]).then(() => {
                renderFrame();
            }).catch(err => {
                container.textContent = "재생에 실패했습니다.\n파일 경로와 서버(Live Server) 환경을 확인해주세요.";
                console.error(err);
            });
        });

        function renderFrame() {
            if (video.paused || video.ended) return;

            // 영상 오디오 싱크 맞춤
            if (Math.abs(video.currentTime - audio.currentTime) > 0.15) {
                video.currentTime = audio.currentTime;
            }

            // 실시간으로 변하는 WIDTH, HEIGHT 크기에 맞춰 그리기
            ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
            
            try {
                const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
                const pixels = imgData.data;
                let asciiArt = "";

                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        const idx = (y * WIDTH + x) * 4;
                        const r = pixels[idx];
                        const g = pixels[idx + 1];
                        const b = pixels[idx + 2];

                        // 루미넌스 밝기 계산법
                        const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                        const charIdx = Math.floor((brightness / 255) * (krChars.length - 1));
                        asciiArt += krChars[charIdx];
                    }
                    asciiArt += "\n";
                }

                container.textContent = asciiArt;
                
            } catch (e) {
                container.textContent = "보안(CORS) 에러가 발생했습니다.";
                console.error(e);
                return;
            }

            requestAnimationFrame(renderFrame);
        }
    </script>
</body>
</html>
