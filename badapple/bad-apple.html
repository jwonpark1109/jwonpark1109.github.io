<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 배드애플 플레이어</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            /* 고정폭 글꼴 지정 및 자모음 분리 방지를 위한 맑은 고딕 설정 */
            font-family: 'Courier New', 'Malgun Gothic', monospace;
            font-size: 10px;        /* 글자 크기 (모니터 해상도에 따라 조절 가능) */
            line-height: 0.85;      /* 줄간격을 줄여서 위아래 공백을 최소화 (비율 최적화) */
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #btn-start {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #btn-start:hover {
            background: #ccc;
        }
        #ascii-container {
            display: inline-block;
            white-space: pre;       /* 공백과 줄바꿈(개행문자)을 그대로 유지 */
            letter-spacing: -1px;   /* 글자 좌우 간격을 좁혀서 밀도감 향상 */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn-start">🍎 배드애플 재생 🍎</button>
    <br>
    <div id="ascii-container">버튼을 누르면 한글로 이루어진 배드애플이 시작됩니다!</div>

    <video id="video" loop muted playsinline style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="audio" loop style="display:none;">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('ascii-container');
        const btnStart = document.getElementById('btn-start');

        // 성능 최적화 옵션 적용
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 해상도 세팅 (가로 글자 수, 세로 줄 수)
        const WIDTH = 100;
        const HEIGHT = 55;
        
        /* [변경사항] 공백을 제외하고 오직 '한글'로만 구성된 밀도 배열
          왼쪽(어두움/공백) -> 오른쪽(밝음/획이 많아 가득 참)
        */
        const krChars = [
            " ", "ㅡ", "ㄱ", "ㄴ", "ㅇ", "ㅅ", "ㅈ", "ㅂ", 
            "ㅍ", "ㅎ", "가", "민", "정", "음", "뷁", "뾿"
        ];

        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            
            // 영상과 오디오를 동시에 재생 시작
            Promise.all([video.play(), audio.play()]).then(() => {
                renderFrame();
            }).catch(err => {
                container.textContent = "재생에 실패했습니다.\n" +
                                        "1. 'video.mp4'와 'sound.mp3' 파일이 이 HTML과 같은 폴더에 있는지 확인하세요.\n" +
                                        "2. Live Server(http://localhost:...) 환경에서 실행했는지 확인하세요.";
                console.error(err);
            });
        });

        function renderFrame() {
            if (video.paused || video.ended) return;

            // 영상과 소리의 씽크(싱크로율)가 어긋나는 것을 방지하기 위해 
            // 오디오 시간 기준으로 비디오 시간을 강제 동기화 (선택 사항, 부드러운 재생을 위해 적용)
            if (Math.abs(video.currentTime - audio.currentTime) > 0.15) {
                video.currentTime = audio.currentTime;
            }

            ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
            
            try {
                const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
                const pixels = imgData.data;
                let asciiArt = "";

                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        const idx = (y * WIDTH + x) * 4;
                        const r = pixels[idx];
                        const g = pixels[idx + 1];
                        const b = pixels[idx + 2];

                        // 평균값 밝기 계산
                        const brightness = (r + g + b) / 3;

                        // 밝기 값을 한글 배열 인덱스로 매핑
                        const charIdx = Math.floor((brightness / 255) * (krChars.length - 1));
                        asciiArt += krChars[charIdx];
                    }
                    asciiArt += "\n";
                }

                container.textContent = asciiArt;
                
            } catch (e) {
                container.textContent = "보안(CORS) 에러가 발생했습니다.\n서버(Live Server 등) 환경에서 실행해 주세요.";
                console.error(e);
                return;
            }

            requestAnimationFrame(renderFrame);
        }
    </script>
</body>
</html>
