<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 배드애플 플레이어</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', 'Malgun Gothic', monospace; /* 고정폭 글꼴 */
            font-size: 9px;         /* 글자 크기 */
            line-height: 0.9;       /* 줄간격을 줄여서 위아래 공백 최소화 */
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #btn-start {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        #ascii-container {
            display: inline-block;
            white-space: pre;       /* 공백, 줄바꿈 유지 */
            letter-spacing: 0px;    /* 한글 특성상 간격을 좁게 세팅 */
            font-weight: bold;
        }
        video {
            display: none;
        }
    </style>
</head>
<body>

    <button id="btn-start">🍎 배드애플 재생 🍎</button>
    <br>
    <div id="ascii-container">버튼을 누르면 한글로 이루어진 배드애플이 시작됩니다!</div>

    <!-- 실시간 변환용 원본 비디오 -->
    <video id="video" crossorigin="anonymous" loop>
        <source src="https://raw.githubusercontent.com/milkbottle0305/bad-apple-ascii/main/res/video.mp4" type="video/mp4">
    </video>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('ascii-container');
        const btnStart = document.getElementById('btn-start');

        // 해상도 세팅 (한글은 가로폭이 넓으므로 비율을 맞추기 위해 가로 글자 수를 약간 조절)
        const WIDTH = 90;
        const HEIGHT = 50;
        
        // [필독] 밀도별 한글 배열 (오른쪽으로 갈수록 화면을 가득 채우는 빽빽한 글자)
        const krChars = [" ", "ㆍ", "ㄱ", "ㄴ", "ㅅ", "ㅇ", "ㅈ", "ㅍ", "🎨", "훈", "민", "정", "음", "뷁", "뾿", "█"];

        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        btnStart.addEventListener('click', () => {
            btnStart.style.display = 'none';
            video.play();
            renderFrame();
        });

        function renderFrame() {
            if (video.paused || video.ended) return;

            ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
            const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
            const pixels = imgData.data;

            let asciiArt = "";

            for (let y = 0; y < HEIGHT; y++) {
                for (let x = 0; x < WIDTH; x++) {
                    const idx = (y * WIDTH + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx + 1];
                    const b = pixels[idx + 2];

                    // 밝기 계산 (0 ~ 255)
                    const brightness = (r + g + b) / 3;

                    // 밝기값을 한글 배열 인덱스로 변환
                    const charIdx = Math.floor((brightness / 255) * (krChars.length - 1));
                    asciiArt += krChars[charIdx];
                }
                asciiArt += "\n";
            }

            container.textContent = asciiArt;
            requestAnimationFrame(renderFrame);
        }
    </script>
</body>
</html>
