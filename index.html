<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Internal Server Error</title>
    
    <link rel="icon" href="https://jwonpark1109.github.io/images/icon.svg" type="image/x-icon">
    
    <style>
        body { 
            background-color: #f2f4f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { 
            background: white; 
            width: 90%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h1 { color: #393b3d; font-size: 24px; margin-top: 20px; }
        p { color: #65676b; line-height: 1.5; margin-bottom: 25px; }
        
        /* 디버그 정보 스타일 */
        debug-box {
            display: block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #a1a3a7;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eeeeee;
            text-align: left;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .error-code { font-weight: bold; color: #f44336; margin-bottom: 25px; font-size: 14px; }
        img { max-width: 150px; height: auto; }

        /* 버튼 컨테이너 및 스타일 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .btn-primary {
            background-color: #111111;
            color: white;
        }
        .btn-primary:hover {
            background-color: #333333;
        }
        .btn-secondary {
            background-color: transparent;
            color: #111111;
            border: 1px solid #adb0b1;
        }
        .btn-secondary:hover {
            background-color: #f2f4f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://jwonpark1109.github.io/images/icon.svg" width="150" alt="Roblox">
        <h1>We're making things better!</h1>
        <p>Roblox is temporarily down for maintenance.<br>Please check back soon.</p>
        
        <debug-box id="debug">
            Error code: 500 - Internal Server Error<br>
            Request ID: <span id="request-id">{loading...}</span><br>
            Server: <span id="server-info">AWS-?-?-KR</span><br>
            Timestamp: <span id="timestamp"></span>
        </debug-box>

        <div class="error-code">Error Code: 500 (Internal Server Error)</div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="location.reload()">Retry</button>
            <a href="https://jwonpark1109.github.io" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>

    <script>
        function generateHash() {
            const part = () => Math.random().toString(36).substring(2, 6);
            let hash = "{";
            for(let i=0; i<13; i++) {
                hash += part() + "-";
            }
            return hash + "KOR1-paju}";
        }

        function generateServerInfo() {
            const num1 = Math.floor(Math.random() * 10);
            const num2 = Math.floor(Math.random() * 100);
            return `AWS-${num1}-${num2}-KR`;
        }

        window.onload = function() {
            document.getElementById('request-id').innerText = generateHash();
            document.getElementById('server-info').innerText = generateServerInfo();
            document.getElementById('timestamp').innerText = new Date().toISOString();
        };
    </script>
</body>
</html>
