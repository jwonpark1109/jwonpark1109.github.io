<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Internal Server Error</title>
    
    <link rel="icon" href="https://jwonpark1109.github.io/images/icon.svg" type="image/x-icon">
    
    <style>
        body { 
            background-color: #f2f4f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { 
            background: white; 
            width: 90%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h1 { color: #393b3d; font-size: 24px; margin-top: 20px; }
        p { color: #65676b; line-height: 1.5; margin-bottom: 25px; }
        
        debug-box {
            display: block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #a1a3a7;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eeeeee;
            text-align: left;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .error-code { font-weight: bold; color: #f44336; margin-bottom: 25px; font-size: 14px; }
        img { max-width: 150px; height: auto; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center; /* 링크 중앙 정렬을 위해 추가 */
        }
        
        /* 로그 다운로드 하이퍼링크 스타일 */
        .download-link {
            font-size: 13px;
            color: #65676b;
            text-decoration: underline;
            margin-bottom: 8px;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }
        .download-link:hover {
            color: #111111;
        }

        .btn {
            width: 100%; /* 버튼 너비를 컨테이너에 맞춤 */
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            box-sizing: border-box;
            display: block;
        }
        .btn-primary {
            background-color: #111111;
            color: white;
        }
        .btn-primary:hover {
            background-color: #333333;
        }
        .btn-secondary {
            background-color: transparent;
            color: #111111;
            border: 1px solid #adb0b1;
        }
        .btn-secondary:hover {
            background-color: #f2f4f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://jwonpark1109.github.io/images/icon.svg" width="150" alt="Roblox">
        <h1>우리는 더 나은 Roblox를 만들고 있어요!</h1>
        <p>Roblox가 알 수 없는 이유로 인해 일시적으로 접속이 불가능합니다.<br>나중에 다시 시도해 주세요.</p>
        
        <debug-box id="debug">
            Error code: 500 - Internal Server Error<br>
            Request ID: <span id="request-id">{loading...}</span><br>
            Server: <span id="server-info">AWS-?-?-KR</span><br>
            Timestamp: <span id="timestamp"></span>
        </debug-box>

        <div class="error-code">Error Code: 500 - Internal Server Error ( 내부 서버 오류 )</div>

        <div class="button-group">
            <button class="download-link" onclick="downloadLog()">로그 다운로드</button>
            
            <button class="btn btn-primary" onclick="location.reload()">재시도</button>
            <a href="https://jwonpark1109.github.io" class="btn btn-secondary">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        function generateHash() {
            const parts = Array.from({length: 8}, () => Math.random().toString(36).substring(2, 6));
            return `{${parts.join('-')}-KOR1-paju}`;
        }

        function generateServerInfo() {
            const num1 = Math.floor(Math.random() * 10);
            const num2 = Math.floor(Math.random() * 100);
            return `AWS-${num1}-${num2}-KR`;
        }

        // 로그를 .txt 파일로 다운로드하는 함수
        function downloadLog() {
            const debugText = document.getElementById('debug').innerText;
            const blob = new Blob([debugText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `roblox_error_log_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        window.onload = function() {
            document.getElementById('request-id').innerText = generateHash();
            document.getElementById('server-info').innerText = generateServerInfo();
            document.getElementById('timestamp').innerText = new Date().toISOString();
        };
    </script>
</body>
</html>
