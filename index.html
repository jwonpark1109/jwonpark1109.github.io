<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roblox - Maintenance</title>
    <style>
        body { background-color: #f2f4f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 100px; }
        .container { background: white; width: 400px; margin: 0 auto; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #393b3d; font-size: 24px; }
        p { color: #65676b; }
        .error-code { font-weight: bold; color: #f44336; margin-top: 20px; }
        img { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.rbxcdn.com/746984aa66782f627d37740e53a316b2.png" width="150" alt="Roblox">
        
        <h1 id="title">We're making things better!</h1>
        <p id="desc">Roblox is temporarily down for maintenance. Please check back soon.</p>
        <div class="error-code" id="error">Error Code: 500 (Internal Server Error)</div>
    </div>

    <script>
        // 대소문자를 랜덤하게 섞는 함수
        function randomizeText(id) {
            const el = document.getElementById(id);
            const text = el.innerText;
            const randomized = text.split('').map(char => {
                return Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase();
            }).join('');
            el.innerText = randomized;
        }

        // 페이지 로드 시 적용
        window.onload = function() {
            randomizeText('title');
            randomizeText('desc');
            randomizeText('error');
        };
    </script>
</body>
</html>
